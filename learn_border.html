<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border Disscussion</title>
    <style>
        h1 {
            border-style: solid;
            border-width: 5px;
            border-color: blue green ;
            margin-top: 80px;
        }
        h2 {
            border-style: double;
            border-width: 10px;
            border-color: rgb(237, 24, 28);
            margin-top: 80px;
        }
        h3 {
            border:2px solid blue;
            border-radius: 10px;
            margin-top: 20px;
        }


    </style>
</head>
<body>
    <h1>This is a heading with a solid border.</h1>
    <h2>This is a heading with a double border.</h2>
    <h3>Hiii</h3>
</body>
</html>
