<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
Learn Positioning in CSS
    </title>
    <style>
        /* difference between position values */
        .one {
            height: 200px;
            width: 600px;
            background-color: rgb(118, 15, 228);
            font-size: 200px;
            text-align: center;
            /* static is a default position */
            position: static;
        }
        .two {
            height: 200px;
            width: 600px;
            background-color: rgb(205, 14, 122);
            font-size: 200px;
            text-align: center;
            /* relative positioning  is  the method of moving an element relative to its normal position */
            position: relative;
            top: 500px;
            left: 300px;
        }
        .three {
            height: 200px;
            width: 600px;
            background-color: rgb(245, 18, 18);
            font-size: 200px;
            text-align: center;
            position: fixed;
            top:500px;
        }
        .four {
            height: 200px;
            width: 600px;
            background-color: rgb(230, 208, 14);
            font-size: 200px;
            text-align: center;
            position: sticky;
            top:500px;
            left:100px;
        }
        .five {
            height: 200px;
            width: 600px;
            background-color: rgb(8, 211, 96);
            font-size: 200px;
            text-align: center;
            position: absolute;
        }

            
    </style>
</head>
<body>
    <div class="one">1</div> 
  
    <div class="three">3</div>
    <div class="four">4</div>
     <div class="two">2</div>
    <div class="five">5</div>
    <div class="one">1</div>
      <div class="two">2</div>
   <div class="four">4</div>
    <div class="three">3</div>
   
    
    <div class="five">5</div>
</body>
</html>
