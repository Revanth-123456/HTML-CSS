<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bootstrap 2</title>

    <!-- bootstrap -->
    <style>

    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
        <style>
            .main{
                border: 1px solid black;
                margin-left: 60px;
                margin-right: 60px;
                height: 40px;
                padding-top: 10px;
                text-align: center;
                margin-bottom: 20px;
            }
            .image{
                height:20px;
                width:20px;
                float: inline-start;
            }
        </style>
</head>


<body>
    <!-- model start -->
    <!-- Button trigger modal -->
    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#staticBackdrop">
        Register
    </button>

    <!-- Modal -->
    <div class="modal fade" id="staticBackdrop" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-labelledby="staticBackdropLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 style=" height: 50px; margin-left: 200px; margin-top: 20px; " class="modal-title fs-5" id="staticBackdropLabel">Get Started</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body main">
                    <img class="image" src="/bootstrap2/google.svg" alt="">
                    <h6>Continue with Google</h6>
                </div>
                <div class="modal-body main">
                    <img class="image" src="/bootstrap2/hi.png" alt="">
                    <h6>Continue with Email</h6>
                </div>
                <div class="modal-body main">
                    <img class="image" src="/bootstrap2/apple.jpg" alt="">
                    <h6>Continue with Apple</h6>
                </div>
                <h6 style="text-align: center; color: gray;">OR</h6>

              <div style="margin-top: 10px;margin-left: 60px; margin-right: 60px; margin-bottom: 10px;"class="d-grid gap-2">
                    <button type="button" class="btn btn-secondary">Continue</button>
                </div>
            </div>
        </div>
    </div>

    <!-- model end -->

    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">

        </script>

</body>

</html>
