<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*priority-1.element selector(p)* 2.inline style 3.id 4.class 5.element(or)internalcss*/
        p{
            color:blue !important;
        }
        #para{
            color: red;
        }
        .one{
            color:pink;
        }
        /* liststyletype are:circle ,disc ,square ,lower alpha,lower roman many*/
        li{
            list-style-type:lower-roman;
        }
        .two{
            height: 400px;
            width:400px ;
            background-color: green;
            /* use below two things and see one by one */
            /* display: none;
            visibility: hidden; */
        }

    </style>
</head>
<body>
    <p style="color:green;" id="para" class="one">
        My Paragraph
    </p>
    <ul>
        <li>List One</li>
    </ul>
    <div class="two"> </div>
        <h1>Hello Text</h1>
   
</body>
</html>
