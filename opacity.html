<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn CSS Colors</title>
    <style>
        /* opacity value 0 to 1 */
        * {
            color: rgba(100, 1000, 100, 1);
        }
        .hi {
            color: #3e0de0;
        }
        /* hsl-Hue, Saturation, Lightness. */
        #helo {
            color: hsl(315, 87%, 45%);
        }
    </style>
</head>
<body>
    <h1>Learn CSS</h1>
    <h2 class="hi">New</h2>
    <h3 id="helo">New 2</h3>
</body>
</html>
