<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEARN DISPLAY</title>
    <style>
        .one {
            height: 400px;
            width: 400px;
            background-color: rgb(220, 25, 18);
            display: inline;
        }
        .two {
            height: 400px;
            width: 400px;
            background-color: orange;
            display: block;
        }
    </style>
</head>
<body>
    <div class="one">hi</div>
    <span class="two">new</span>
    <!-- block element h1,div,p -->
     <!-- inline element span,img,anchor tag(a) -->
</body>
</html>
