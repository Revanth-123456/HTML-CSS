<!DOCTYPE html>
<html>
<head>
    <title>Background Clip Example</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            width: 200px;
            height: 150px;
            border: 10px solid black;
            padding: 20px;
            background-color: lightblue;
            font-weight: bold;
            /* text-align and align-contect but dont use in flex*/
            text-align: center;
            align-content: center;
        }

        /* 1. Default */
        .border-box {
            background-clip: border-box;
        }

        /* 2. Padding box */
        .padding-box {
            background-clip: padding-box;
        }

        /* 3. Content box */
        .content-box {
            background-clip: content-box;
        }
    </style>
</head>
<body>

    <h2>Background Clip Example</h2>

    <div class="container">
        <div class="box border-box">border-box</div>
        <div class="box padding-box">padding-box</div>
        <div class="box content-box">content-box</div>
    </div>

</body>
</html>
