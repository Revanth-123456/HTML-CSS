<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS background</title>
    <style>
        body {
            /* background-image: url('https://images.pexels.com/photos/18360475/pexels-photo-18360475.jpeg'); */
            background-image: url('/hi1.jpg');
            /* orelse it will give multiple images filled */
             background-repeat: no-repeat;
             /* scroll or fixed */
             background-attachment: fixed;
             /* the below not used means it will show white space down */
             /* background-size: cover;   */
             /* left,right and center */
             background-position: right;
             height: 7400px;
             width:200%;
        }
        .hi {
            color: rgb(232, 7, 7);
            text-align: center;
            padding: 100px;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <h1 class="hi">Hello this is my World</h1>
</body>
</html>
