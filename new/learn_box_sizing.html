<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        .one{
            height: 400px;
            width:400px;
            border:2px solid black;
        }
        .two{

    <div class="two">Text two</div>
