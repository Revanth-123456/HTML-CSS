<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* parent should have relative position or absolute position */
        .parent {
            position: relative;
            height: 400px;
            width: 400px;
            background-color: rgb(2, 179, 238);
        }
        .child {
            position: absolute;
            height: 100px;
            width: 100px;
            top:0;
            right: 0;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="parent">Parent
        <div class="child">
            Child
        </div>
    </div>

</body>
</html>
