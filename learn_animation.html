<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one{
            height: 400px;
            width: 400px;
            background-color: yellow;
            animation-name: myDiv;
            /* transition-duration: 20s; */
            animation-duration: 5s;
            position: relative;
        }
        @keyframes myDiv{
            /* from{
                background-color:red;
            }
            to{
                background-color: aqua;
            } */

            0%{
                background-color: red;left:0px;top:0px;

            }
            25%{
                background-color: yellow;left: 400px;top:0px;
            }
            50%{
                background-color: hotpink;left: 400px;top:400px;
            }
            75%{
                background-color: brown;left: 0px;top:400px;
            }
            100%{
                background-color: green;left: 0px;top:0px;
            }

        }
        .one:hover{
            width: 600px;
        }
    </style>
</head>
<body>
    <div class="one"></div>
</body>
</html>
