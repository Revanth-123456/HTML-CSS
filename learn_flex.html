<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .one {
            height: 200px;
            width: 500px;
            background-color: lightblue;
            font-size: 200px;
            text-align: center;
        }

        .two {
            height: 200px;
            width: 500px;
            background-color: rgb(212, 15, 140);
            font-size: 200px;
            text-align: center;
        }

        .three {
            height: 200px;
            width: 500px;
            background-color: rgb(9, 220, 174);
            font-size: 200px;
            text-align: center;
        }

        .four {
            height: 200px;
            width: 500px;
            background-color: rgb(249, 120, 15);
            font-size: 200px;
            text-align: center;
        }

        .five {
            height: 200px;
            width: 500px;
            background-color: rgb(51, 17, 224);
            font-size: 200px;
            text-align: center;
        }

        .six {
            height: 200px;
            width: 500px;
            background-color: rgb(227, 11, 29);
            font-size: 200px;
            text-align: center;
        }
        .main {
            display: flex;
            /* flex directions are row ,column,row reverse and column reverse  */
            flex-direction: row;
            /* flex wrap is used to wrap and responsiveness */
            flex-wrap: wrap;
            border: 3px solid black;
        }
    </style>
</head>

<body>
    <div class="main">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
        <div class="six">6</div>
    </div>
</body>

</html>
